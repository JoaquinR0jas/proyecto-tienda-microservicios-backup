# Nombre con el que se registra en Eureka
spring.application.name=auth-service
server.port=8091

# MySQL - base de datos propia del auth-service
spring.datasource.url=jdbc:mysql://localhost:3307/ms_auth?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Clave secreta para firmar los JWT (debe ser larga y compleja)
jwt.secret=clave-super-secreta-latienda-2024-djtienda-microservicios
# Tiempo de expiración del token en milisegundos (86400000 = 24 horas)
jwt.expiration=86400000