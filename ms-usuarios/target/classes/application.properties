# Nombre con el que se registra en Eureka
spring.application.name=ms-usuarios
server.port=8090

# MySQL - misma config que los otros ms (puerto 3307)
spring.datasource.url=jdbc:mysql://localhost:3307/ms_usuarios?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA - update crea/modifica tablas sin borrar datos
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Eureka - apunta al servidor de descubrimiento
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true