# Nombre con el que se registra en Eureka
spring.application.name=ms-carrito
server.port=8082

# MySQL - base de datos propia del carrito
spring.datasource.url=jdbc:mysql://localhost:3307/ms_carrito?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver



logging.level.DJ.TIENDA.ms_carrito=DEBUG
logging.level.org.springframework.web=DEBUG


# JPA 🧑‍💻
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect








# Eureka 💻
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true