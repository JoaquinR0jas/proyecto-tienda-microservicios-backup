spring:
  application:
    name: api-gateway
  
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: ms-catalogo
              uri: lb://MS-CATALOGO
              predicates:
                - Path=/api/catalogo/**

            - id: ms-inventario
              uri: lb://MS-INVENTARIO
              predicates:
                - Path=/api/inventario/**

            - id: ms-usuarios
              uri: lb://MS-USUARIOS
              predicates:
                - Path=/api/usuarios/**

            - id: ms-carrito
              uri: lb://MS-CARRITO
              predicates:
                - Path=/api/carrito/**

            - id: auth-service
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/auth/**

            - id: ms-pedidos
              uri: lb://MS-PEDIDOS
              predicates:
                - Path=/api/pedidos/**

            - id: ms-pagos
              uri: lb://MS-PAGOS
              predicates:
                - Path=/api/pagos/**    

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/