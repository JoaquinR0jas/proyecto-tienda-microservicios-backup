spring:
  application:
    name: api-gateway
  
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: ms-catalogo
              uri: lb://MS-CATALOGO
              predicates:
                - Path=/api/catalogo/**

            - id: ms-inventario
              uri: lb://MS-INVENTARIO
              predicates:
                - Path=/api/inventario/**

            - id: ms-usuarios
              uri: lb://MS-USUARIOS
              predicates:
                - Path=/api/usuarios/**

            - id: ms-carrito
              uri: lb://MS-CARRITO
              predicates:
                - Path=/api/carrito/**

            - id: auth-service
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/auth/**

            - id: ms-pedidos
              uri: lb://MS-PEDIDOS
              predicates:
                - Path=/api/pedidos/**

            - id: ms-pagos
              uri: lb://MS-PAGOS
              predicates:
                - Path=/api/pagos/**    

            - id: ms-envios
              uri: lb://MS-ENVIOS
              predicates:
                  - Path=/api/envios/**
            - id: ms-notificaciones
              uri: lb://MS-NOTIFICACIONES
              predicates:
                  - Path=/api/notificaciones/**

            - id: ms-marketing
              uri: lb://MS-MARKETING
              predicates:
                - Path=/api/marketing/**
            - id: ms-resenas
              uri: lb://MS-RESENAS
              predicates:
                - Path=/api/resenas/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/