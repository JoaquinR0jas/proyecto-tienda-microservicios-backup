services:
  mysql:
    image: mysql:8.0
    container_name: tienda-mysql
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 384M

  eureka-server:
    build:
      context: .
      target: eureka-server
    container_name: tienda-eureka
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx96m"
    ports:
      - "8761:8761"
    deploy:
      resources:
        limits:
          memory: 256M

  auth-service:
    build:
      context: .
      target: auth-service
    container_name: tienda-auth
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx96m"
      "eureka.client.serviceUrl.defaultZone": "http://eureka-server:8761/eureka/"
      "eureka.instance.prefer-ip-address": "false"
      "spring.datasource.url": "jdbc:mysql://mysql:3306/ms_auth?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"
      "spring.datasource.username": "root"
      "spring.datasource.password": ""
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8091:8091"
    deploy:
      resources:
        limits:
          memory: 256M

