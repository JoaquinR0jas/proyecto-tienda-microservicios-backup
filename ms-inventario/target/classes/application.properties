# Configuración del Servidor puerto y nombre 😈😈
server.port=8082
spring.application.name=ms-inventario

# Configuración de Base de Datos MySQL que el usuario es roor y la contrassena por definir
spring.datasource.url=jdbc:mysql://localhost:3307/ms_inventario?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Conexión con Eureka con el puerte que ya le di
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/